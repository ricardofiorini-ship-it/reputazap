<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Avaliar — StarTouch</title>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/startouch-vars.css"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="apple-touch-icon" href="/startouch-logo.png"/>
<meta property="og:type" content="website"/>
<meta property="og:title" content="StarTouch"/>
<meta property="og:description" content="Plataforma de relacionamento local pra negócios brasileiros."/>
<meta property="og:image" content="/og-image.png"/>
<meta property="og:url" content="https://startouch.com.br/avaliar"/>
<link rel="canonical" href="https://startouch.com.br/avaliar"/>
<meta name="twitter:card" content="summary_large_image"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#F8F9FA;font-family:'Inter','General Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#202124;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .card{width:100%;max-width:440px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 1px 2px rgba(60,64,67,0.06), 0 16px 40px -12px rgba(60,64,67,0.16);animation:fadeUp 0.4s ease;}
  .header{padding:24px 24px 18px;text-align:center;border-bottom:1px solid #f1f3f4;}
  .biz-name{font-family:'Inter','General Sans',sans-serif;font-size:19px;font-weight:700;color:#202124;letter-spacing:-0.01em;}
  .biz-sub{font-size:12px;color:#5F6368;margin-top:4px;}
  .body{padding:28px 24px 32px;}

  /* Powered by StarTouch — credito discreto (negocio domina visualmente) */
  .footer-credit{
    padding:24px 24px 28px;
    text-align:center;
    border-top:1px solid #f1f3f4;
  }
  .footer-credit a{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;color:#9CA3AF;text-decoration:none;
    transition:color .15s;
    font-family:'Inter','General Sans',sans-serif;
  }
  .footer-credit a:hover{color:#6B7280;}
  .footer-credit img{width:24px;height:24px;display:block;}

  /* Step base */
  .step{animation:fadeUp 0.35s ease;}
  .step.hidden{display:none;}

  .headline{font-family:'Inter','General Sans',sans-serif;font-size:20px;font-weight:700;color:#0F0F0F;text-align:center;margin-top:16px;margin-bottom:6px;line-height:1.3;letter-spacing:-0.015em;text-wrap:balance;}
  @media(min-width:480px){.headline{font-size:24px;}}
  .subline{font-size:13.5px;color:#5F6368;text-align:center;margin-bottom:22px;line-height:1.55;}

  /* Botão (usado na tela de erro) */
  .choice-btn{
    box-sizing:border-box;
    width:100%;
    padding:18px 20px;
    border:2px solid transparent;
    border-radius:12px;
    font-family:inherit;
    font-size:inherit;
    line-height:1.4;
    text-align:left;
    text-decoration:none;
    cursor:pointer;
    display:flex;flex-direction:column;gap:4px;
    transition:background .15s, border-color .15s, color .15s, transform .12s, box-shadow .15s;
  }
  .choice-btn:focus-visible{outline:3px solid rgba(26,115,232,0.32);outline-offset:2px;}
  .choice-btn strong{font-size:16px;font-weight:700;letter-spacing:-0.005em;color:inherit;}
  .choice-btn--primary{
    background:#1A73E8;border-color:#1A73E8;color:#fff;
    box-shadow:0 1px 2px rgba(26,115,232,0.20), 0 4px 12px -2px rgba(26,115,232,0.18);
  }
  .choice-btn--primary:hover{
    background:#174EA6;border-color:#174EA6;
    transform:translateY(-1px);
    box-shadow:0 2px 6px rgba(26,115,232,0.30), 0 8px 20px -4px rgba(26,115,232,0.30);
  }

  /* Thanks */
  .thanks-icon{font-size:48px;text-align:center;margin-bottom:14px;}
  .thanks-text{font-size:14px;color:#5F6368;line-height:1.6;text-align:center;}

  /* Estado de erro (link inválido, biz não encontrado) */
  .error-icon{font-size:44px;text-align:center;margin:24px 0 4px;line-height:1;}
  .loading-text{text-align:center;color:#80868B;font-size:13px;padding:32px 0;}

  /* Esconde header quando body está em erro (header so faz sentido se ha biz) */
  .card.is-error .header{display:none;}

  /* Preview banner */
  .preview-banner{position:fixed;top:0;left:0;right:0;background:#1A73E8;color:#fff;padding:8px 16px;text-align:center;font-size:12px;font-weight:600;z-index:100;display:flex;align-items:center;justify-content:center;gap:8px;}
  .preview-banner span{font-weight:400;opacity:0.85;}
  body.has-preview{padding-top:56px;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="header">
    <div class="biz-name" id="bizName">Carregando...</div>
    <div class="biz-sub" id="bizSub">—</div>
  </div>

  <div class="body" id="bodyContent">

    <!-- STEP: agradecimento (usado no caso de já ter avaliado recentemente) -->
    <div id="stepThanks" class="step hidden">
      <div class="thanks-icon">✓</div>
      <div class="headline" style="margin-bottom:10px;">Obrigado!</div>
      <div class="thanks-text">Obrigado pela sua avaliação.</div>
    </div>

    <!-- STEP: erro (link inválido, biz não encontrado, falha API) — mutuamente exclusivo -->
    <div id="stepError" class="step hidden">
      <div class="error-icon" aria-hidden="true">⚠️</div>
      <div class="headline" id="errorTitle" style="margin-top:8px;">Link inválido</div>
      <div class="subline" id="errorMsg">Esse link não está mais ativo ou o negócio não foi encontrado.</div>
      <a class="choice-btn choice-btn--primary" href="https://startouch.com.br" rel="noopener" style="margin-top:8px;text-align:center;align-items:center;">
        <strong>Voltar pro StarTouch</strong>
      </a>
    </div>

    <!-- STEP: loading inicial (placeholder enquanto API responde) -->
    <div id="stepLoading" class="step">
      <div class="loading-text">Carregando…</div>
    </div>
  </div>

  <div class="footer-credit">
    <a href="https://startouch.com.br" target="_blank" rel="noopener" aria-label="StarTouch — site oficial">
      <img src="/startouch-logo.svg" alt="" width="24" height="24"/>
      <span>Powered by StarTouch</span>
    </a>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const placeId = params.get("place_id") || params.get("place");
const isPreview = params.get("preview") === "1";

function checkDuplicate() {
  if (isPreview) return false;
  const key = `rz_reviewed_${placeId}`;
  const last = localStorage.getItem(key);
  if (last) {
    const days = (Date.now() - parseInt(last)) / (1000*60*60*24);
    if (days < 30) return true;
  }
  return false;
}

function markReviewed() {
  if (isPreview) return;
  localStorage.setItem(`rz_reviewed_${placeId}`, Date.now().toString());
}

function showError(title, msg) {
  document.getElementById("card").classList.add("is-error");
  if (title) document.getElementById("errorTitle").textContent = title;
  if (msg) document.getElementById("errorMsg").textContent = msg;
  show("stepError");
}

// Busca com timeout: o redirect pro Google NÃO pode ficar refém de uma
// chamada lenta. Se estourar o tempo, seguimos sem o cabeçalho enriquecido.
function fetchWithTimeout(url, ms) {
  return Promise.race([
    fetch(url).then(r => r.json()),
    new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), ms))
  ]);
}

async function loadBusiness() {
  if (isPreview) {
    document.body.classList.add("has-preview");
    const banner = document.createElement("div");
    banner.className = "preview-banner";
    banner.innerHTML = "🔍 Modo simulação <span>— você será levado ao Google, igual ao cliente real</span>";
    document.body.prepend(banner);
  }
  // Sem place_id não há pra onde mandar — esse sim é um erro real.
  if (!placeId) {
    showError("Link inválido", "Esse link não tem identificação do negócio. Peça um novo ao estabelecimento.");
    return;
  }

  // O destino só depende do place_id, que já temos em mãos. Constrói já.
  const googleUrl = `https://search.google.com/local/writereview?placeid=${encodeURIComponent(placeId)}`;

  // Já avaliou nos últimos 30 dias? Decisão 100% local, não precisa de rede.
  if (checkDuplicate()) {
    showThanks("Você já avaliou esse negócio recentemente. Obrigado!");
    return;
  }

  // bizinfo é SÓ pra enfeitar o cabeçalho (nome/nota). Uma falha ou lentidão
  // dele NUNCA pode impedir a avaliação — por isso tem timeout e seguimos
  // pro Google mesmo que ele falhe.
  try {
    const data = await fetchWithTimeout(`/api/bizinfo?place_id=${encodeURIComponent(placeId)}`, 2500);
    if (data?.name) {
      document.getElementById("bizName").textContent = data.name;
      document.getElementById("bizSub").textContent = `⭐ ${data.rating ?? "—"} · ${data.total ?? 0} avaliações no Google`;
    }
  } catch { /* sem cabeçalho enriquecido — segue pro Google do mesmo jeito */ }

  // Vai direto pro Google Meu Negócio pra avaliar (sem menu/peneira).
  markReviewed();
  window.location.href = googleUrl;
}
loadBusiness();

function show(stepId) {
  ["stepLoading","stepThanks","stepError"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle("hidden", id !== stepId);
  });
}

function showThanks(text) {
  if (text) {
    document.querySelector("#stepThanks .thanks-text").textContent = text;
  }
  show("stepThanks");
}
</script>
</body>
</html>
